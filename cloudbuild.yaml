steps:
  # Build the container image with environment variables
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}'
      - '--build-arg'
      - 'SUPABASE_SERVICE_KEY=${_SUPABASE_SERVICE_KEY}'
      - '--build-arg'
      - 'JWT_SECRET=${_JWT_SECRET}'
      - '--build-arg'
      - 'OPENROUTER_API_KEY=${_OPENROUTER_API_KEY}'
      - '--build-arg'
      - 'GEMINI_API_KEY=${_GEMINI_API_KEY}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/engage-africa:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/engage-africa:latest'
      - '.'

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/engage-africa:$SHORT_SHA']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'engage-africa'
      - '--image'
      - 'gcr.io/$PROJECT_ID/engage-africa:$SHORT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '300'
      - '--concurrency'
      - '80'
      - '--max-instances'
      - '3'

images:
  - 'gcr.io/$PROJECT_ID/engage-africa:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/engage-africa:latest'

substitutions:
  _REGION: us-central1
  _NEXT_PUBLIC_SUPABASE_URL: https://your-project.supabase.co
  _NEXT_PUBLIC_SUPABASE_ANON_KEY: your-anon-key
  _SUPABASE_SERVICE_KEY: your-service-key
  _JWT_SECRET: your-jwt-secret
  _OPENROUTER_API_KEY: ''
  _GEMINI_API_KEY: ''
